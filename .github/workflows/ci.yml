name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8
  _JAVA_OPTIONS: "-Duser.country=US -Duser.language=en"

jobs:
  test:
    name: Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        java: [ '8', '11' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Configure Maven settings.xml (insecure central mirror)
        run: |
          mkdir -p ~/.m2/repository
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.1.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.1.0 http://maven.apache.org/xsd/settings-1.1.0.xsd">
              <mirrors>
                  <mirror>
                  <id>central-insecure</id>
                  <url>http://insecure.repo1.maven.org/maven2</url>
                  <mirrorOf>*</mirrorOf>
                  </mirror>
              </mirrors>
          </settings>
          EOF

      - name: Build and test
        working-directory: h2
        env:
          JAVA_OPTS: -Xmx512m
        run: ./build.sh jar testTravis

  build-jdk11:
    name: Build artifact (JDK 11)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Configure Maven settings.xml (insecure central mirror)
        run: |
          mkdir -p ~/.m2/repository
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.1.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.1.0 http://maven.apache.org/xsd/settings-1.1.0.xsd">
              <mirrors>
                  <mirror>
                  <id>central-insecure</id>
                  <url>http://insecure.repo1.maven.org/maven2</url>
                  <mirrorOf>*</mirrorOf>
                  </mirror>
              </mirrors>
          </settings>
          EOF

      - name: Build jar
        working-directory: h2
        env:
          JAVA_OPTS: -Xmx512m
        run: ./build.sh jar

      - name: Upload h2-1.4.200.jar
        uses: actions/upload-artifact@v4
        with:
          name: h2-1.4.200.jar
          path: h2/bin/h2-1.4.200.jar
          retention-days: 1
          if-no-files-found: error
